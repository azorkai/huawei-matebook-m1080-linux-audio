PACKAGE_NAME="matebook-m1080-audio"
PACKAGE_VERSION="1.0.0"

# All the heavy lifting (fetch matching kernel source, patch it, prepare the
# build tree, pin vermagic) happens in the pre-build hook. It runs once per
# target kernel, with DKMS's build directory as the working directory.
PRE_BUILD="dkms-prebuild.sh ${kernelver}"

# Build only the two modules we touched, out of the patched in-tree source.
MAKE[0]="make -C ksrc -j$(nproc) M=sound/soc/amd modules"
CLEAN="rm -rf ksrc"

# snd-acp-config: selects the legacy ACP backend for the M1080 DMI match.
BUILT_MODULE_NAME[0]="snd-acp-config"
BUILT_MODULE_LOCATION[0]="ksrc/sound/soc/amd"
DEST_MODULE_LOCATION[0]="/kernel/sound/soc/amd"

# snd-acp-legacy-mach: carries the acp3x-es83xx machine driver + M1080 quirk.
BUILT_MODULE_NAME[1]="snd-acp-legacy-mach"
BUILT_MODULE_LOCATION[1]="ksrc/sound/soc/amd/acp"
DEST_MODULE_LOCATION[1]="/kernel/sound/soc/amd/acp"

# Rebuild automatically on every new kernel DKMS sees.
AUTOINSTALL="yes"
